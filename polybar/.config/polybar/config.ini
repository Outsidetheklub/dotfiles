[colors]
background = #1c2027
background-alt = #3B4252
foreground = #cdd6f4
foreground-alt = #a6adc8
primary = #89b4fa
secondary = #a6e3a1
alert = #f38ba8
disabled = #585b70

[bar/main]
width = 100%
height = 28
radius = 0
fixed-center = true
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2
line-color = ${colors.primary}

# border-bottom removed

padding-left = 0
padding-right = 2
module-margin-left = 0
module-margin-right = 2

font-0 = MesloLGS Nerd Font:size=10;2
font-1 = MesloLGS Nerd Font:size=9;2
font-2 = "Font Awesome 6 Free:style=solid:size=10;2"
font-3 = MesloLGS Nerd Font:size=11;2

modules-left = i3 window
modules-center = date
modules-right = volume bluetooth ram network tray power

cursor-click = pointer
cursor-scroll = pointer

[bar/second]
monitor = HDMI-0
width = 100%
height = 28
radius = 0
fixed-center = true
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2
line-color = ${colors.primary}

# border-bottom removed

padding-left = 0
padding-right = 2
module-margin-left = 0
module-margin-right = 2

font-0 = MesloLGS Nerd Font:size=10;2
font-1 = MesloLGS Nerd Font:size=9;2
font-2 = "Font Awesome 6 Free:style=solid:size=10;2"
font-3 = MesloLGS Nerd Font:size=11;2

modules-left = i3-second window
modules-center = date
modules-right = volume bluetooth ram network power

cursor-click = pointer
cursor-scroll = pointer

[module/tray]
type = internal/tray

[module/i3-second]
type = internal/i3
format = <label-state> <label-mode>
label-focused = %index%
label-focused-foreground = ${colors.background}
label-focused-background = ${colors.primary}
label-focused-padding = 1
label-unfocused = %index%
label-unfocused-foreground = ${colors.foreground-alt}
label-unfocused-padding = 1
label-visible = %index%
label-visible-foreground = ${colors.foreground}
label-visible-padding = 1
label-urgent = %index%
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 1
pin-workspaces = true
label-separator = |
label-separator-foreground = ${colors.disabled}

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
label-focused = %index%
label-focused-foreground = ${colors.background}
label-focused-background = ${colors.primary}
label-focused-padding = 1
label-unfocused = %index%
label-unfocused-foreground = ${colors.foreground-alt}
label-unfocused-padding = 1
label-visible = %index%
label-visible-foreground = ${colors.foreground}
label-visible-padding = 1
label-urgent = %index%
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 1
pin-workspaces = true
label-separator = |
label-separator-foreground = ${colors.disabled}

[module/ram]
type = custom/script
exec = $HOME/.config/polybar/scripts/ram.sh
interval = 5
format = <label>
format-foreground = ${colors.secondary}

[module/window]
type = internal/xwindow
label = %title%
label-foreground = ${colors.foreground-alt}
label-font = 4
label-maxlen = 60

[module/power]
type = custom/script
exec = echo ""
interval = 86400
click-left = $HOME/.local/bin/power-menu.sh &
format = <label>
format-foreground = ${colors.alert}

[module/bluetooth]
type = custom/script
exec = $HOME/.config/polybar/scripts/bluetooth.sh
interval = 5
click-left = $HOME/.config/polybar/scripts/bluetooth-rofi.sh &
format = <label>
format-foreground = ${colors.primary}

[module/volume]
type = custom/script
exec = $HOME/.config/polybar/scripts/volume.sh
interval = 1
click-left = pavucontrol &
click-right = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
scroll-up = wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
scroll-down = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
format = <label>
format-foreground = ${colors.foreground}

[module/network]
type = custom/script
interval = 10
exec = nmcli -t -f NAME,DEVICE con show --active 2>/dev/null | grep -E "wlan0|wlp" | cut -d: -f1 | head -1 | sed 's/^/🌐 /' || echo "❌"
click-left = /home/vasileioslap/.config/polybar/scripts/wifi.sh
click-right = nm-connection-editor &

[module/date]
type = internal/date
interval = 30
date = %a %d %b %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.foreground}
