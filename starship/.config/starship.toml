# version: 1.0.0

add_newline = false
continuation_prompt = "[▸▹ ](dimmed #ccdcd6)"

format = """($nix_shell$container$fill$git_metrics\n)$cmd_duration\
$hostname\
$localip\
$shlvl\
$shell\
$env_var\
$jobs\
$sudo\
$username\
$character"""

right_format = """
$singularity\
$kubernetes\
$directory\
$vcsh\
$fossil_branch\
$git_branch\
$git_commit\
$git_state\
$git_status\
$hg_branch\
$pijul_channel\
$docker_context\
$package\
$c\
$cmake\
$cobol\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$golang\
$guix_shell\
$haskell\
$haxe\
$helm\
$java\
$julia\
$kotlin\
$gradle\
$lua\
$nim\
$nodejs\
$ocaml\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$python\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$solidity\
$swift\
$terraform\
$vlang\
$vagrant\
$zig\
$buf\
$conda\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$crystal\
$custom\
$status\
$os\
$battery\
$time"""

[fill]
symbol = ' '

[character]
format = "$symbol "
success_symbol = "[◎](bold italic #c9fff3)"
error_symbol = "[○](italic #95a7ef)"
vimcmd_symbol = "[■](italic dimmed #44def5)"
# not supported in zsh
vimcmd_replace_one_symbol = "◌"
vimcmd_replace_symbol = "□"
vimcmd_visual_symbol = "▼"

[env_var.VIMSHELL]
format = "[$env_value]($style)"
style = '#44def5 italic'

[sudo]
format = "[$symbol]($style)"
style = "bold italic #b0bcf8"
symbol = "⋈┈"
disabled = false

[username]
style_user = "#c9fff3 bold italic"
style_root = "#95a7ef bold italic"
format = "[⭘ $user]($style) "
disabled = false
show_always = false

[directory]
home_symbol = "⌂"
truncation_length = 2
truncation_symbol = "□ "
read_only = " ◈"
use_os_path_sep = true
style = "italic #87afd1"
format = '[$path]($style)[$read_only]($read_only_style)'
repo_root_style = 'bold #87afd1'
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) [△](bold #abc4d8)'

[cmd_duration]
min_time = 0
format = "[◄ $duration ](italic #ccdcd6)"

[jobs]
format = "[$symbol$number]($style) "
style = "#ccdcd6"
symbol = "[▶](#87afd1 italic)"

[localip]
ssh_only = true
format = " ◯[$localipv4](bold #95a7ef)"
disabled = false

[time]
disabled = false
format = "[ $time]($style)"
time_format = "%R"
utc_time_offset = "local"
style = "italic dimmed #ccdcd6"

[battery]
format = "[ $percentage $symbol]($style)"
full_symbol = "█"
charging_symbol = "[↑](italic bold #44def5)"
discharging_symbol = "↓"
unknown_symbol = "░"
empty_symbol = "▃"

[[battery.display]]
threshold = 20
style = "italic bold #8383ff"

[[battery.display]]
threshold = 60
style = "italic dimmed #b0bcf8"

[[battery.display]]
threshold = 70
style = "italic dimmed #75fcdd"

[git_branch]
format = " [$branch(:$remote_branch)]($style)"
symbol = "[△](bold italic #abc4d8)"
style = "italic #abc4d8"
truncation_symbol = "⋯"
truncation_length = 11
ignore_branches = ["main", "master"]
only_attached = true

[git_metrics]
format = '([▴$added]($added_style))([▿$deleted]($deleted_style))'
added_style = 'italic dimmed #44def5'
deleted_style = 'italic dimmed #8383ff'
ignore_submodules = true
disabled = false

[git_status]
style = "bold italic #abc4d8"
format = "([⎪$ahead_behind$staged$modified$untracked$renamed$deleted$conflicted$stashed⎥]($style))"
conflicted = "[◪◦](italic #b0bcf8)"
ahead = "[▴│[${count}](bold #ccdcd6)│](italic #44def5)"
behind = "[▿│[${count}](bold #ccdcd6)│](italic #8383ff)"
diverged = "[◇ ▴┤[${ahead_count}](regular #ccdcd6)│▿┤[${behind_count}](regular #ccdcd6)│](italic #b0bcf8)"
untracked = "[◌◦](italic #c9fff3)"
stashed = "[◃◈](italic #ccdcd6)"
modified = "[●◦](italic #75fcdd)"
staged = "[▪┤[$count](bold #ccdcd6)│](italic #afe2ff)"
renamed = "[◎◦](italic #abc4d8)"
deleted = "[✕](italic #8383ff)"

[deno]
format = " [deno](italic) [∫ $version](#44def5 bold)"
version_format = "${raw}"

[lua]
format = " [lua](italic) [${symbol}${version}]($style)"
version_format = "${raw}"
symbol = "⨀ "
style = "bold #c9fff3"

[nodejs]
format = " [node](italic) [◫ ($version)](bold #89ecff)"
version_format = "${raw}"
detect_files = ["package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]
detect_extensions = []

[python]
format = " [py](italic) [${symbol}${version}]($style)"
symbol = "[⌉](bold #abc4d8)⌊ "
version_format = "${raw}"
style = "bold #c9fff3"

[ruby]
format = " [rb](italic) [${symbol}${version}]($style)"
symbol = "◆ "
version_format = "${raw}"
style = "bold #8383ff"

[rust]
format = " [rs](italic) [$symbol$version]($style)"
symbol = "⊃ "
version_format = "${raw}"
style = "bold #8383ff"

[package]
format = " [pkg](italic dimmed) [$symbol$version]($style)"
version_format = "${raw}"
symbol = "◨ "
style = "dimmed #75fcdd italic bold"

[swift]
format = " [sw](italic) [${symbol}${version}]($style)"
symbol = "◁ "
style = "bold #a29eff"
version_format = "${raw}"

[aws]
disabled = true
format = " [aws](italic) [$symbol $profile $region]($style)"
style = "bold #87afd1"
symbol = "▲ "

[buf]
symbol = "■ "
format = " [buf](italic) [$symbol $version $buf_version]($style)"

[c]
symbol = "ℂ "
format = " [$symbol($version(-$name))]($style)"

[conda]
symbol = "◯ "
format = " conda [$symbol$environment]($style)"

[dart]
symbol = "◁◅ "
format = " dart [$symbol($version )]($style)"

[docker_context]
symbol = "◧ "
format = " docker [$symbol$context]($style)"

[elixir]
symbol = "△ "
format = " exs [$symbol $version OTP $otp_version ]($style)"

[elm]
symbol = "◩ "
format = " elm [$symbol($version )]($style)"

[golang]
symbol = "∩ "
format = " go [$symbol($version )]($style)"

[haskell]
symbol = "❯λ "
format = " hs [$symbol($version )]($style)"

[java]
symbol = "∪ "
format = " java [${symbol}(${version} )]($style)"

[julia]
symbol = "◎ "
format = " jl [$symbol($version )]($style)"

[memory_usage]
symbol = "▪▫▪ "
format = " mem [${ram}( ${swap})]($style)"

[nim]
symbol = "▴▲▴ "
format = " nim [$symbol($version )]($style)"

[nix_shell]
style = 'bold italic dimmed #87afd1'
symbol = '✶'
format = '[$symbol nix⎪$state⎪]($style) [$name](italic dimmed #ccdcd6)'
impure_msg = '[⌽](bold dimmed #8383ff)'
pure_msg = '[⌾](bold dimmed #44def5)'
unknown_msg = '[◌](bold dimmed ellow)'

[spack]
symbol = "◇ "
format = " spack [$symbol$environment]($style)"
